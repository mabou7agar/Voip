[general]
static=yes
writeprotect=no
clearglobalvars=no

[internal]
; Dial 100 to ring the main phone SIP client.
exten => 100,1,NoOp(Ringing endpoint 100)
 same => n,Dial(PJSIP/100,30)
 same => n,Hangup()

; Dial 200 to ring the old Android phone SIP client.
exten => 200,1,NoOp(Ringing endpoint 200)
 same => n,Dial(PJSIP/200,30)
 same => n,Hangup()

; Dial 900 followed by a mobile number to trigger the future Android bridge app.
; Example: 90015551234567
; The dialplan injects the requested GSM target in a SIP header the Android app can read.
exten => _900X.,1,NoOp(Outbound GSM bridge request to ${EXTEN:3})
 same => n,Set(__BRIDGE_TARGET=${EXTEN:3})
 same => n,Dial(PJSIP/200,45,b(bridge-headers^add^1(${BRIDGE_TARGET})))
 same => n,Hangup()

; Keep a plain 900 destination available for testing the Android bridge SIP endpoint.
exten => 900,1,NoOp(Ringing Android bridge endpoint without a target number)
 same => n,Dial(PJSIP/200,30)
 same => n,Hangup()

; Keep invalid dial attempts explicit during testing.
exten => i,1,Playback(invalid)
 same => n,Hangup()

[bridge-headers]
exten => add,1,NoOp(Injecting bridge target ${ARG1} for Android bridge)
 same => n,Set(PJSIP_HEADER(add,X-Bridge-Target)=${ARG1})
 same => n,Return()
