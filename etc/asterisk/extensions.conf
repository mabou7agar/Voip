[general]
static=yes
writeprotect=no
clearglobalvars=no

[internal]
; Dial 100 to ring the main phone SIP client.
exten => 100,1,NoOp(Ringing mainphone)
 same => n,Dial(PJSIP/mainphone,30)
 same => n,Hangup()

; Dial 200 to ring the old Android phone SIP client.
exten => 200,1,NoOp(Ringing oldphone)
 same => n,Dial(PJSIP/oldphone,30)
 same => n,Hangup()

; Keep invalid dial attempts explicit during testing.
exten => i,1,Playback(invalid)
 same => n,Hangup()

