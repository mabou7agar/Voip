; PJSIP configuration for a minimal two-endpoint PBX.
; SIP clients register directly to the server IP: 167.235.231.202

[global]
type=global
user_agent=asterisk-gsm-bridge

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
external_signaling_address=167.235.231.202
external_media_address=167.235.231.202
allow_reload=yes

; Extension 100 -> main phone softphone
[mainphone]
type=endpoint
context=internal
transport=transport-udp
disallow=all
allow=ulaw,alaw
direct_media=no
rewrite_contact=yes
force_rport=yes
rtp_symmetric=yes
aors=mainphone
auth=mainphone
callerid=Main Phone <100>

[mainphone]
type=aor
max_contacts=1
remove_existing=yes
qualify_frequency=60

[mainphone]
type=auth
auth_type=userpass
username=100
password=MainPhoneSIP-ChangeMe123

; Extension 200 -> old Android phone softphone
[oldphone]
type=endpoint
context=internal
transport=transport-udp
disallow=all
allow=ulaw,alaw
direct_media=no
rewrite_contact=yes
force_rport=yes
rtp_symmetric=yes
aors=oldphone
auth=oldphone
callerid=Old Phone <200>

[oldphone]
type=aor
max_contacts=1
remove_existing=yes
qualify_frequency=60

[oldphone]
type=auth
auth_type=userpass
username=200
password=OldPhoneSIP-ChangeMe123
