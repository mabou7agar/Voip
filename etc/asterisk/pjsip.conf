; PJSIP configuration for a minimal two-endpoint PBX.
; SIP clients register directly to the server IP: 167.235.231.202

[global]
type=global
user_agent=asterisk-gsm-bridge

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
external_signaling_address=167.235.231.202
external_media_address=167.235.231.202
allow_reload=yes

; Use numeric object names so REGISTER username matching is unambiguous.
; This keeps the SIP username, endpoint id, and extension number aligned.

; Extension 100 -> main phone softphone
[100]
type=endpoint
context=internal
transport=transport-udp
disallow=all
allow=ulaw,alaw
direct_media=no
rewrite_contact=yes
force_rport=yes
rtp_symmetric=yes
aors=100
auth=100
callerid=Main Phone <100>

[100]
type=aor
max_contacts=1
remove_existing=yes
qualify_frequency=60

[100]
type=auth
auth_type=userpass
username=100
password=MainPhoneSIP-ChangeMe123

; Extension 200 -> old Android phone softphone
[200]
type=endpoint
context=internal
transport=transport-udp
disallow=all
allow=ulaw,alaw
direct_media=no
rewrite_contact=yes
force_rport=yes
rtp_symmetric=yes
aors=200
auth=200
callerid=Old Phone <200>

[200]
type=aor
max_contacts=1
remove_existing=yes
qualify_frequency=60

[200]
type=auth
auth_type=userpass
username=200
password=OldPhoneSIP-ChangeMe123
